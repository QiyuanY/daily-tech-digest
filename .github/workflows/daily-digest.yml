name: Daily Tech Digest

on:
  schedule:
    # UTC 02:00 daily = 北京时间 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install Pillow requests
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Fetch daily news
        run: |
          python scripts/fetch_news.py \
            --sources hn,github,producthunt \
            --top 5 \
            --config-out /tmp/news_config.json \
            --readme-out README.md

      - name: Generate AI background
        env:
          VOLC_ACCESSKEY: ${{ secrets.VOLC_ACCESSKEY }}
          VOLC_SECRETKEY: ${{ secrets.VOLC_SECRETKEY }}
        run: |
          PROMPT="abstract dark technology background, gradient mesh, neon blue purple glow, futuristic digital art, high quality"
          python scripts/generate_bg.py "$PROMPT" --size 2K --output /tmp/bg.png

      - name: Generate cards
        run: |
          DATE=$(date +%Y-%m-%d)
          python scripts/generate_cards.py /tmp/news_config.json \
            --output-dir "archive/$DATE" \
            --bg /tmp/bg.png
          cp /tmp/news_config.json "archive/$DATE/config.json"
          cp /tmp/bg.png "archive/$DATE/bg.png"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          DATE=$(date +%Y-%m-%d)
          git diff --cached --quiet || git commit -m "📰 Daily digest: $DATE"
          git push
